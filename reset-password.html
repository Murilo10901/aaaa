<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAA Finance - Redefinir senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070611;
      --panel:#120d23;
      --line:rgba(255,255,255,.08);
      --text:#f5f3ff;
      --muted:#b7afcb;
      --primary:#8b5cf6;
      --primary-2:#6d28d9;
      --radius:28px;
      --shadow:0 24px 60px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"Inter",system-ui,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(109,40,217,.16), transparent 18%),
        linear-gradient(180deg,#070611 0%, #0a0815 100%);
      color:var(--text);
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(520px,100%);
      background:linear-gradient(180deg,rgba(18,13,35,.96),rgba(13,10,28,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
    }

    .eyebrow{
      margin:0 0 6px;
      color:#d9ceff;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    h1,h2,h3,p{margin:0}

    .muted{
      color:var(--muted);
      line-height:1.65;
      margin-top:10px;
    }

    .form{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:8px;
    }

    input{
      width:100%;
      border:1px solid rgba(255,255,255,.08);
      background:#f3f4f6;
      color:#1f2937;
      border-radius:14px;
      padding:14px;
      outline:none;
      font:inherit;
    }

    input:focus{
      border-color:rgba(139,92,246,.62);
      box-shadow:0 0 0 4px rgba(139,92,246,.14);
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font:inherit;
      font-weight:800;
      background:linear-gradient(90deg,var(--primary),var(--primary-2));
      color:#fff;
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      color:#efe8ff;
      line-height:1.55;
      white-space:pre-wrap;
      min-height:54px;
    }

    .back-link{
      display:inline-block;
      margin-top:16px;
      color:#cab8ff;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">AAA Finance</p>
    <h2>Defina sua nova senha</h2>
    <p class="muted">
      Esta etapa altera a senha da sua conta de login. Ela não altera a senha de proteção dos dados financeiros.
    </p>

    <div class="form">
      <div>
        <label for="newPassword">Nova senha</label>
        <input id="newPassword" type="password" placeholder="Digite a nova senha" />
      </div>

      <div>
        <label for="confirmPassword">Confirmar senha</label>
        <input id="confirmPassword" type="password" placeholder="Repita a nova senha" />
      </div>

      <button id="saveNewPasswordBtn" class="btn">Salvar nova senha</button>
    </div>

    <div id="statusBox" class="status">Aguardando ação...</div>

    <a class="back-link" href="index.html">← Voltar para o login</a>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://lucgrqkdlrnrhfbnqerg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DenbhUATl84jKOnpRxtlbA_jknRkx2M';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const saveNewPasswordBtn = document.getElementById('saveNewPasswordBtn');
    const statusBox = document.getElementById('statusBox');

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.style.background = isError ? 'rgba(239,68,68,.10)' : 'rgba(255,255,255,.05)';
      statusBox.style.borderColor = isError ? 'rgba(239,68,68,.28)' : 'rgba(255,255,255,.06)';
    }

    async function saveNewPassword() {
      const pass1 = newPassword.value.trim();
      const pass2 = confirmPassword.value.trim();

      if (!pass1 || !pass2) {
        setStatus('Preencha os dois campos de senha.', true);
        return;
      }

      if (pass1 !== pass2) {
        setStatus('As senhas não coincidem.', true);
        return;
      }

      if (pass1.length < 6) {
        setStatus('Use uma senha com pelo menos 6 caracteres.', true);
        return;
      }

      setStatus('Validando recuperação...');

      const { data: sessionData } = await supabase.auth.getSession();

      if (!sessionData.session) {
        setStatus('Sessão de recuperação não encontrada ou expirada. Abra novamente o link enviado por email.', true);
        return;
      }

      setStatus('Salvando nova senha...');

      const { error } = await supabase.auth.updateUser({
        password: pass1
      });

      if (error) {
        setStatus('Erro ao salvar nova senha: ' + error.message, true);
        return;
      }

      await supabase.auth.signOut();
      setStatus('Senha redefinida com sucesso. Agora volte ao login e entre com a nova senha.');
    }

    saveNewPasswordBtn.addEventListener('click', saveNewPassword);

    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        setStatus('Link validado. Agora defina sua nova senha.');
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabase.auth.getSession();

      if (data.session) {
        setStatus('Link validado. Agora defina sua nova senha.');
      } else {
        setStatus('Abra esta página pelo link enviado ao seu email.', true);
      }
    });
  </script>
</body>
</html>
